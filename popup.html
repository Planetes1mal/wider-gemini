<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wider Gemini</title>
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <div class="container">
        <header class="header">
            <div class="header-icon">WG</div>
            <h1 id="i18n-appName">Wider Gemini</h1>
            <p class="header-subtitle" id="i18n-headerSubtitle">让对话界面更宽更舒适</p>
        </header>

        <section class="card width-card">
            <div class="card-header">
                <span class="card-icon">W</span>
                <label for="widthSlider" class="card-title" id="i18n-widthLabel">对话区域宽度</label>
            </div>
            <div class="unit-segment" role="group" aria-label="Width unit">
                <button type="button" id="unitPxBtn" class="segment-btn segment-active" data-unit="px">px</button>
                <button type="button" id="unitPercentBtn" class="segment-btn" data-unit="percent">%</button>
            </div>
            <div class="range-inputs">
                <label class="range-label"><span id="i18n-widthMin">最小宽度</span>
                    <input type="number" id="widthMinInput" min="300" max="5000" step="50" value="700">
                </label>
                <label class="range-label"><span id="i18n-widthMax">最大宽度</span>
                    <input type="number" id="widthMaxInput" min="300" max="5000" step="50" value="2000">
                </label>
            </div>
            <div class="slider-wrapper">
                <div class="slider-container">
                    <input type="range" id="widthSlider" min="700" max="2000" step="50" value="1000">
                    <div class="slider-track"></div>
                </div>
                <div class="slider-value">
                    <span id="widthValue">1000</span>
                    <span id="widthUnitLabel" class="unit">px</span>
                </div>
            </div>
            <div class="preset-toolbar">
                <button type="button" id="editPresetsBtn" class="secondary-btn"><span
                        id="i18n-editPresets">编辑预设</span></button>
                <button type="button" id="donePresetsBtn" class="secondary-btn" style="display:none;"><span
                        id="i18n-donePresets">完成</span></button>
            </div>
            <div class="preset-buttons" id="presetButtonsContainer"></div>
        </section>

        <section class="card manage-card">
            <button type="button" class="collapse-header" id="managePresetsToggle" aria-expanded="false">
                <span class="card-icon">P</span>
                <span class="card-title" id="i18n-managePresets">管理预设</span>
                <span class="collapse-summary" id="managePresetsSummary"></span>
            </button>
            <div class="collapse-body" id="managePresetsBody" hidden>
                <div id="managePresetsRows"></div>
            </div>
        </section>

        <section class="card density-card">
            <div class="card-header">
                <span class="card-icon">T</span>
                <label for="compactnessSlider" class="card-title" id="i18n-densityLabel">阅读密度</label>
            </div>
            <div class="slider-wrapper">
                <div class="slider-container">
                    <input type="range" id="compactnessSlider" min="0" max="100" step="1" value="0">
                    <div class="slider-track"></div>
                </div>
                <div class="slider-value">
                    <span id="compactnessValue">0</span>
                    <span class="unit" id="i18n-compactnessUnit">%</span>
                </div>
            </div>
            <button type="button" class="collapse-header advanced-toggle" id="advancedDensityToggle" aria-expanded="false">
                <span class="card-title" id="i18n-advancedDensity">高级间距</span>
                <span class="collapse-summary" id="densitySummary"></span>
            </button>
            <div class="collapse-body" id="advancedDensityBody" hidden>
                <label class="range-label density-row"><span id="i18n-lineHeightLabel">行高</span>
                    <input type="range" id="lineHeightSlider" min="1.15" max="1.8" step="0.01" value="1.42">
                    <span id="lineHeightValue">1.42</span>
                </label>
                <label class="range-label density-row"><span id="i18n-paragraphSpacingLabel">段落间距</span>
                    <input type="range" id="paragraphSpacingSlider" min="0" max="24" step="1" value="12">
                    <span><span id="paragraphSpacingValue">12</span> px</span>
                </label>
                <button type="button" id="resetDensityBtn" class="secondary-btn"><span id="i18n-resetDensity">重置间距</span></button>
            </div>
        </section>

        <section class="card code-card">
            <div class="card-header">
                <span class="card-icon">C</span>
                <label for="codeWrapToggle" class="card-title" id="i18n-codeWrapLabel">代码区域自动换行</label>
            </div>
            <div class="toggle-wrapper">
                <div class="toggle-container">
                    <label class="switch">
                        <input type="checkbox" id="codeWrapToggle">
                        <span class="slider-toggle"></span>
                    </label>
                    <span id="codeWrapStatus" class="status-text">关闭</span>
                </div>
            </div>
        </section>

        <section class="info-card">
            <div class="info-icon">i</div>
            <div class="info-content">
                <p class="info-text" id="i18n-infoText1">拖动滑块或点击预设按钮调整宽度</p>
                <p class="info-text" id="i18n-infoText2">设置会自动保存并应用到所有 Gemini 标签页</p>
            </div>
        </section>

        <div id="refreshNotice" class="refresh-notice">
            <span class="refresh-spinner" aria-hidden="true"></span>
            <span class="refresh-text" id="i18n-refreshing">正在刷新页面...</span>
        </div>
    </div>
    <script src="settings-utils.js"></script>
    <script src="popup.js"></script>
</body>

</html>
